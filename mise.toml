[tools]
rust = "stable"

# All workspace commands run through mise so the toolchain is consistent everywhere
# (local + CI). Prefer `mise run <task>` over calling cargo directly.

[tasks.build]
description = "Build the whole workspace"
run = "cargo build --workspace"

[tasks.app]
description = "Launch the GUI app"
run = "cargo run -p sdr-app"

# Forward args after `--`, e.g. `mise run cli -- listen --freq 100M` or `mise run cli -- device list`.
[tasks.cli]
description = "Run the headless CLI (pass args after --)"
run = "cargo run -q -p sdr-cli --"

# The band scanner. `scan` launches the TUI (for you to run, like `app`); `probe` decodes one
# station headlessly. Forward args after `--`, e.g. `mise run probe -- --freq 92.5M`.
[tasks.scan]
description = "Scan the FM band for RDS song/artist data (TUI)"
run = "cargo run -q -p sdr-scanner -- scan"

[tasks.probe]
description = "Decode RDS from one station headlessly (pass args after --)"
run = "cargo run -q -p sdr-scanner -- probe"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.fmt]
description = "Format all code"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Lint (warnings are errors)"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.check]
description = "CI gate: format check + clippy"
depends = ["fmt-check", "clippy"]

[tasks.ci]
description = "Full CI: check + test"
depends = ["check", "test"]

# Validation. `validate` is the full no-device check (lint + all tests, including the recorded
# RDS fixture). `validate-live` decodes a real station off a plugged-in RTL-SDR (set
# SDR_LIVE_FREQ_HZ to pick it); it skips cleanly if no device is present.
[tasks.validate]
description = "Validate everything that needs no device (lint + tests + golden fixture)"
depends = ["ci"]

[tasks.validate-live]
description = "Validate live decode against a plugged-in RTL-SDR (SDR_LIVE_FREQ_HZ to choose station)"
run = "cargo test -p sdr-engine --release --test live -- --ignored --nocapture"

[tasks.bench]
description = "Decode-throughput benchmarks (criterion), replaying the recorded fixture"
run = "cargo bench -p sdr-engine"
